name: Awamir Plus CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify repository hygiene
        run: bash scripts/verify_no_secrets.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compile Frappe app Python
        run: python3 -m compileall backend/awamir_plus/awamir_plus

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter dependencies
        working-directory: mobile/awamir_plus_mobile
        run: flutter pub get

      - name: Flutter analyze
        working-directory: mobile/awamir_plus_mobile
        run: flutter analyze

      - name: Flutter tests
        working-directory: mobile/awamir_plus_mobile
        run: flutter test
